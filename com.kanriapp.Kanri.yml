id: com.kanriapp.Kanri

runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24

command: kanri
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc

build-options:
  append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/Kanri/cargo
    CARGO_NET_OFFLINE: "true"

modules:
  - name: Kanri
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/kanriapp/kanri
        tag: app-v0.8.2
        commit: 612be4929d36ac4a27884a4de95527bda0490dc7
      - node-sources.json
      - cargo-sources.json
    build-commands:
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --verbose
      - yarn install --offline
      - yarn tauri build -- --no-bundle

      - install -Dm755 -t /app/bin/ src-tauri/target/release/kanri
